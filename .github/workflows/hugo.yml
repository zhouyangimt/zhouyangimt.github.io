name: Deploy Hugo

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # 防止部署提交再次触发的循环
    if: "!contains(github.event.head_commit.message, '[deploy]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to master
        run: |
          # 把 public/ 的内容覆写到仓库根目录
          cp -r public/* .
          # 保留 CNAME 如果有
          git add -A
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --staged --quiet || git commit -m "[deploy] $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin master
          git push origin master:main --force
