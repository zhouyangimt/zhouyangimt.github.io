14|<span class=tags><span class=tag>pantry</span><span class=tag>guide</span><span class=tag>beginner</span><span class=tag>shopping</span><span class=tag>essentials</span></span></div></header><div class=content><p><img src="/images/chinese-pantry-cover.jpg" alt="A home kitchen spice rack packed with bottles, jars, and bags of Chinese sauces and seasonings — this is only the beginning" width="1200" height="1200" decoding="async" fetchpriority="high"></p><p>So. You want to cook Chinese food at home. You walk into an Asian supermarket, find the sauce aisle, and freeze. Soy sauce — but which one? There are twelve. Oyster sauce, hoisin sauce, fish sauce, black vinegar, rice vinegar, Chinkiang vinegar, Shaoxing wine, cooking wine, fermented bean paste, chili bean paste, doubanjiang — wait, are those last three the same thing? Then you see the dried goods: star anise, cassia bark, Sichuan peppercorns, five-spice powder, thirteen-spice powder, dried chilies in five varieties, and a bag of something labeled "sand ginger" that you're fairly certain is neither sand nor ginger.</p><p>Here's the thing: <strong>this is only the beginning.</strong> What you're looking at in a typical Chinese supermarket is maybe ten percent of what exists. Regional Chinese cuisines have their own entire pantries. A Sichuan kitchen runs on doubanjiang, fermented black beans, and chili oil. A Cantonese kitchen lives on oyster sauce, hoisin, and fermented bean curd. A Shanghainese kitchen keeps dark soy, rock sugar, and aged Shaoxing wine. Walk into a Hunanese kitchen and you'll find pickled chilies and fermented soybeans you've never heard of. None of these overlap perfectly.</p><p>But here's the good news: <strong>you don't need any of that yet.</strong></p><p>If you're just starting to explore Chinese cooking — if you want to make kung pao chicken on a Tuesday, a simple stir-fried vegetable on Wednesday, and maybe a braised pork belly when friends come over — you need exactly eleven things. Not fif... [truncated]

16|<h2 id=the-core-11>The Core 11, In Order of Importance</h2>
17|
18|<h3 id=soy-sauce>1. Light Soy Sauce + Dark Soy Sauce</h3>
19|<p><img src="/images/soy-sauce-comparison.jpg" alt="Light soy sauce and dark soy sauce side by side — light soy is thin and salty, dark soy is thick and used for color" width="1200" height="674" decoding="async" loading="lazy"></p>
20|<p>If you buy nothing else on this list, buy these two. They are the spine of Chinese cooking.</p>
21|<p><strong>Light soy sauce</strong> (生抽, <em>shēng chōu</em>) is what you reach for ninety percent of the time. Thin, salty, deeply savory — it's the default seasoning liquid. You use it in stir-fries, marinades, dipping sauces, and basically any dish that needs salt and umami at the same time. If a Chinese recipe just says "soy sauce" without specifying, it means light soy.</p>
22|<p><strong>Dark soy sauce</strong> (老抽, <em>lǎo chōu</em>) is thicker, slightly sweeter, and less salty. It exists for one reason: color. A tablespoon of dark soy turns pale pork belly into that glossy mahogany you see in restaurant-quality hong shao rou. It doesn't add much flavor — it's cosmetic, and it's essential for anything braised.</p>
23|<p>Get both. They are not interchangeable. Light soy is the worker; dark soy is the makeup artist. Pearl River Bridge light soy and Lee Kum Kee dark soy are the standards.</p>
24|
25|<h3 id=oyster-sauce>2. Oyster Sauce</h3>
26|<p><img src="/images/oyster-sauce.jpg" alt="A bottle of oyster sauce — thick, dark brown, and the fastest umami shortcut in Chinese cooking" width="1200" height="800" decoding="async" loading="lazy"></p>
27|<p>Oyster sauce (蚝油, <em>háo yóu</em>) is the cheat code. It's made from oyster extract, sugar, and salt, reduced to a thick, glossy brown syrup. A tablespoon transforms blanched greens into restaurant-quality vegetables. It adds depth to stir-fries without making them taste like oysters — the flavor is more "savory-sweet depth" than "seafood."</p>
28|<p>If you've ever wondered why your stir-fried bok choy doesn't taste like the one from the Chinese takeout place, this is what you're missing. Lee Kum Kee premium oyster sauce — the one with the lady in the boat on the label.</p>
29|
30|<h3 id=shaoxing-wine>3. Shaoxing Wine</h3>
31|<p><img src="/images/shaoxing-wine.jpg" alt="A bottle of Shaoxing cooking wine — amber-colored rice wine used for deglazing and marinating" width="1200" height="800" decoding="async" loading="lazy"></p>
32|<p>Shaoxing wine (料酒, <em>liào jiǔ</em>) is a fermented rice wine used the way Western cooks use dry white wine or sherry: to deglaze a pan, to lift heavy flavors, to cut through the funk of meat and fish. A splash into a hot wok just as the meat hits the oil — that sizzle-and-hiss is the sound of alcohol burning off and leaving behind something rounder and more complex.</p>
33|<p>If you don't have Shaoxing wine, dry sherry is a passable substitute. But Shaoxing wine is cheap and lasts forever in the pantry. Soeos Shaoxing cooking wine works fine.</p>
34|
35|<h3 id=chinkiang-vinegar>4. Chinkiang Vinegar</h3>
36|<p><img src="/images/chinkiang-vinegar.jpg" alt="A bottle of Chinkiang black vinegar — dark, malty, and the soul of Chinese cold appetizers and braises" width="1200" height="800" decoding="async" loading="lazy"></p>
37|<p>Chinkiang vinegar (镇江香醋, <em>Zhènjiāng xiāng cù</em>) is a black rice vinegar from Zhenjiang, a city on the Yangtze River. It's darker, maltier, and far more complex than Western vinegars — less sharp than white vinegar, less sweet than balsamic, with a smoky depth that comes from aging in clay pots. You use it in cold appetizers (especially smashed cucumber salad), in braised dishes (tang cu pai gu — sweet and sour ribs — is nothing without it), and as a dipping sauce for dumplings.</p>
38|<p>If you only own one Chinese vinegar, make it this one. Gold Plum Chinkiang vinegar is the brand every Chinese kitchen trusts.</p>
39|
40|<h3 id=doubanjiang>5. Pixian Doubanjiang</h3>
41|<p><img src="/images/doubanjiang.jpg" alt="A jar of Pixian doubanjiang — brick-red fermented broad bean paste, the soul of Sichuan cooking" width="1200" height="800" decoding="async" loading="lazy"></p>
42|<p>Doubanjiang (郫县豆瓣酱, <em>Píxiàn dòubàn jiàng</em>) is fermented broad bean paste from Pixian county in Sichuan, aged in clay jars for one to three years under the Sichuan sun. It's brick-red, deeply salty, faintly funky, and it is the single most important ingredient in Sichuan cooking. Mapo tofu, twice-cooked pork, Sichuan boiled fish — none of them exist without doubanjiang.</p>
43|<p>Here's what you need to know: doubanjiang is concentrated. You don't use half a jar; you use a tablespoon. A single jar will last you months. And hoisin sauce is not doubanjiang. Gochujang is not doubanjiang. If a recipe tells you to substitute either one, close that tab. Sichuan Pixian doubanjiang — the kind in the red-labeled jar.</p>
44|
45|<h3 id=sichuan-peppercorn>6. Sichuan Peppercorns</h3>
46|<p><img src="/images/sichuan-peppercorn.jpg" alt="Sichuan peppercorns — reddish-brown husks that produce a tingling, numbing sensation unique to Sichuan cuisine" width="1200" height="799" decoding="async" loading="lazy"></p>
47|<p>Sichuan peppercorns (花椒, <em>huā jiāo</em>) are not actually pepper. They're the dried husks of the prickly ash shrub, and they don't produce heat — they produce <em>má</em> (麻), a tingling, buzzing, numbing sensation that feels like your tongue is vibrating at 50 Hz. Combined with chili heat, it creates <em>málà</em> (麻辣), the signature flavor of Sichuan cuisine.</p>
48|<p>There is no substitute for this. If you're not making Sichuan food specifically, you can skip it. But if you want to cook mapo tofu or kung pao chicken the real way, you need the real thing. Buy them whole, toast them in a dry pan until fragrant, then grind. Pre-ground Sichuan peppercorn powder is a dead battery. Soeos Sichuan peppercorns are reliably good.</p>
49|
50|<h3 id=star-anise>7. Star Anise</h3>
51|<p><img src="/images/star-anise.jpg" alt="Star anise — eight-pointed star-shaped pods with a warm, licorice-like aroma used in braises" width="1200" height="894" decoding="async" loading="lazy"></p>
52|<p>Star anise (八角, <em>bā jiǎo</em>) is a beautiful eight-pointed spice pod that smells like licorice and warm winter kitchens. You drop one or two whole stars into a braise — hong shao rou, beef noodle soup, soy sauce chicken — and let them infuse for hours. That's it. You don't eat them. You fish them out before serving, the same way you'd remove a bay leaf.</p>
53|<p>One bag of star anise will last you approximately three years. This is the lowest-maintenance item on the list. Soeos star anise — whole, not broken.</p>
54|
55|<h3 id=five-spice>8. Five-Spice Powder</h3>
56|<p><img src="/images/five-spice.jpg" alt="Five-spice powder — a reddish-brown blend of star anise, cloves, cinnamon, Sichuan peppercorn, and fennel" width="1200" height="800" decoding="async" loading="lazy"></p>
57|<p>Five-spice powder (五香粉, <em>wǔ xiāng fěn</em>) is the lazy cook's braising shortcut. It's a pre-ground blend of star anise, cloves, Chinese cinnamon, Sichuan peppercorn, and fennel seed — the core five spices that show up in most Chinese braises and roasts. You use it for dry rubs (char siu, roast duck), for seasoning ground meat fillings (dumplings, spring rolls), and for quick braises when you don't want to fish out individual whole spices.</p>
58|<p>You'll use it maybe once every two weeks. A small bag goes a long way. NPG five-spice powder is a solid choice.</p>
59|
60|<h3 id=cornstarch>9. Cornstarch</h3>
61|<p>Here's where the line between "Chinese" and "Western" pantry starts to blur. Cornstarch (淀粉, <em>diàn fěn</em>) does exactly the same thing in a Chinese kitchen that it does in yours: thicken sauces, coat proteins for velveting, and bind fillings. If you already have cornstarch in your pantry — and you probably do — you're done. No special Chinese version required. Roots Circle organic cornstarch if you need more.</p>
62|
63|<h3 id=sesame-oil>10. Sesame Oil</h3>
64|<p>Same story. Sesame oil (芝麻油, <em>zhīma yóu</em>) in Chinese cooking is a finishing oil — a teaspoon drizzled over cold appetizers, stirred into dumpling dipping sauce, or splashed into a bowl of noodle soup right before serving. It's never used as a cooking oil (the smoke point is too low and the flavor burns off). The way an Italian cook reaches for extra-virgin olive oil at the end of a dish is exactly how a Chinese cook uses sesame oil.</p>
65|<p>You want <strong>toasted</strong> sesame oil — dark amber, intensely nutty, and aromatic. The pale yellow "sesame oil" sold as a neutral cooking oil is not the same thing. 365 by Whole Foods toasted sesame oil does the job.</p>
66|
67|<h3 id=msg>11. MSG</h3>
68|<p>Let's address the elephant in the room. MSG (味精, <em>wèi jīng</em>) — monosodium glutamate — is not a Chinese-specific ingredient. It was discovered by a Japanese chemist in 1908, and it occurs naturally in tomatoes, Parmesan cheese, and mushrooms. It is used in practically every Chinese restaurant kitchen, and if you've ever eaten Doritos, you've eaten MSG.</p>
69|<p>A pinch of MSG does for savory dishes what salt does for flavor in general: it makes things taste more like themselves. Stir-fries, soups, braises — a quarter teaspoon at the end of cooking and suddenly everything tastes deeper. You don't need it. But a small bag costs about three dollars and lasts a year. Ajinomoto MSG — the original.</p>
70|
71|<h2 id=what-you-dont-need>The "You Don't Need These Yet" List</h2>
72|
73|<p>Chinese supermarkets are full of things that look essential and aren't. Here's what you can safely ignore for now:</p>
74|
75|<ul>
76|<li><strong>Hoisin sauce</strong> — Useful for Cantonese roast meats and Peking duck pancakes. You won't use it more than twice a year.</li>
77|<li><strong>Fish sauce</strong> — Southeast Asian, not Chinese. Different cuisines, different pantries.</li>
78|<li><strong>Fermented black beans (douchi)</strong> — Essential for a handful of Sichuan classics (mapo tofu, steamed spare ribs). Not essential for daily cooking.</li>
79|<li><strong>Sesame paste</strong> — Used in dan dan noodles and a few cold dishes. Buy it when a recipe specifically calls for it.</li>
80|<li><strong>Sha cha sauce, hoisin, fermented bean curd, shrimp paste</strong> — These are regional specialists. Unless you're building a Cantonese or Fujianese pantry from scratch, you don't need them.</li>
81|<li><strong>Thirteen-spice powder</strong> — Five-spice is enough. Thirteen-spice is five-spice with extra steps.</li>
82|<li><strong>Chili oil</strong> — Make your own. Hot oil over chili flakes takes thirty seconds and tastes fresher than anything in a jar.</li>
83|</ul>
84|
85|<h2 id=if-you-only-buy>If You Only Buy…</h2>
86|
87|<p>Not ready to commit to all eleven? Here's the tiered approach:</p>
88|
89|<p><strong>3 items (absolute minimum):</strong> Light soy sauce, dark soy sauce, oyster sauce. With these three, you can stir-fry any vegetable, season any meat, and make a respectable braise.</p>
90|
91|<p><strong>6 items (the sweet spot):</strong> Add Shaoxing wine, Chinkiang vinegar, and cornstarch. Now you can deglaze, make cold appetizers, and velvet your meat like a restaurant.</p>
92|
93|<p><strong>9 items (Sichuan-ready):</strong> Add doubanjiang, Sichuan peppercorns, and MSG. Mapo tofu, twice-cooked pork, kung pao chicken — the Sichuan canon opens up.</p>
94|
95|<p><strong>11 items (fully armed):</strong> Add star anise and five-spice powder. You can now braise pork belly, make beef noodle soup, and season dumpling fillings. There is almost no home-style Chinese dish you can't make.</p>
96|
97|<h2 id=storage>A Note on Storage</h2>
98|
99|<p>Most of these items are fermented, salted, or dried — they're built to last. Soy sauce, oyster sauce, Chinkiang vinegar, and Shaoxing wine will keep for months in a cool cabinet (oyster sauce should be refrigerated after opening). Doubanjiang lasts effectively forever in the fridge — the salt content is so high that nothing can grow in it. Sichuan peppercorns and star anise should be kept in sealed containers away from light, and they'll stay potent for a year. Five-spice powder, like any ground spice, loses its edge after six months — buy the smallest bag you can find.</p>
