baseURL = 'https://zhouyang.dev/'
title = 'zhouyang — The 25th Frame'
theme = 'minimal'
buildFuture = true

[params]
  description = 'From Shanghai. ex-Microsoft, ex-Google, ex-NVIDIA. Sharing tech with China, and the real taste of Chinese food, tea, and baijiu with the world.'
  author = 'zhouyang'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 禁用混合 RSS，使用分板块独立 RSS
[outputFormats.SearchIndex]
  name = 'SearchIndex'
  mediaType = 'application/json'
  baseName = 'search-index'
  isPlainText = true
  notAlternative = true

[outputs]
  home = ['HTML', 'SearchIndex']
  section = ['HTML', 'RSS']

[menu]
  [[menu.main]]
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    name = 'Tech'
    url = '/posts/'
    weight = 2
  [[menu.main]]
    name = 'Chinese Cuisine'
    url = '/cuisine/'
    weight = 3
  [[menu.main]]
    name = '🍵 Tea'
    url = '/tea/'
    weight = 4
  [[menu.main]]
    name = '🥃 Baijiu'
    url = '/baijiu/'
    weight = 5
