{{ define "main" }}
<article class="post-content">
  <h1>{{ .Title }}</h1>
  <div class="meta">
    <time>{{ .Date.Format "2006-01-02" }}</time>
    {{ with .Params.tags }}
    <span class="tags">
      {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
    </span>
    {{ end }}
  </div>
  {{ .Content }}
</article>
{{ end }}
