{{ define "main" }}
<section class="post-list">
  <h2>分类：{{ .Title }}</h2>
  {{ range .Pages }}
  <article class="post-card">
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <div class="meta"><time>{{ .Date.Format "2006-01-02" }}</time></div>
    <p class="summary">{{ .Summary | truncate 150 }}</p>
  </article>
  {{ end }}
</section>
{{ end }}
