{{ define "main" }}
  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <div class="meta">
        <time>{{ .Date.Format "2006-01-02" }}</time>
        {{ with .Params.tags }}
        <span class="tags">
          {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
        </span>
        {{ end }}
      </div>
    </header>
    <div class="content">
      {{ .Content }}
    </div>
    {{ partial "adsense.html" . }}
  </article>
{{ end }}
