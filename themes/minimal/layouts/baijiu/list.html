{{ define "main" }}
  <div class="section-list">
    <h1>{{ .Title }}</h1>
    {{ range .Pages }}
    <article class="post-item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <div class="meta"><time>{{ .Date.Format "2006-01-02" }}</time></div>
    </article>
    {{ end }}
  </div>
{{ end }}
