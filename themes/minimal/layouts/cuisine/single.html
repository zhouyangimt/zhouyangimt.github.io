{{ define "main" }}
<article class="cuisine-post">
  <header>
    <h1>{{ .Title }}</h1>
    <div class="meta">
      <time>{{ .Date.Format "2006-01-02" }}</time>
      {{ with .Params.tags }}
      <span class="tags">
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      </span>
      {{ end }}
    </div>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>

<nav class="post-nav">
  {{ with .PrevInSection }}
  <a href="{{ .RelPermalink }}" class="prev">← {{ .Title }}</a>
  {{ end }}
  {{ with .NextInSection }}
  <a href="{{ .RelPermalink }}" class="next">{{ .Title }} →</a>
  {{ end }}
</nav>

<section class="comments">
  <h2>💬 Comments</h2>
  <script src="https://utteranc.es/client.js"
          repo="zhouyangimt/zhouyangimt.github.io"
          issue-term="pathname"
          label="comment"
          theme="github-dark"
          crossorigin="anonymous"
          async>
  </script>
</section>
{{ end }}
