{{ define "main" }}
<article class="single-post">
  <header>
    <h1>{{ .Title }}</h1>
    <div class="meta">
      <time>{{ .Date.Format "2006-01-02" }}</time>
      {{ with .Params.tags }}
      <span class="tags">
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      </span>
      {{ end }}
    </div>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>

<nav class="post-nav">
  {{ with .PrevInSection }}
  <a href="{{ .RelPermalink }}" class="prev">← {{ .Title }}</a>
  {{ end }}
  {{ with .NextInSection }}
  <a href="{{ .RelPermalink }}" class="next">{{ .Title }} →</a>
  {{ end }}
</nav>
{{ end }}
